tool_descriptions:
    graph_findRootObjects: |
      Use this tool to find root objects (objects with no upstream dependencies) in Teradata databases.
      
      WHEN TO USE THIS TOOL:
      - User asks "which objects should I start analysing?"
      - User wants to find "root objects", "base objects", or "foundational objects"
      - User asks "which objects have no dependencies?"
      - User wants starting points for downstream impact analysis
      - User asks "which tables/objects are at the beginning of the data flow?"
      - User wants to identify independent objects in a schema
      
      TOOL PARAMETERS:
      -----------------
      container_pattern: str = Field(..., description="""
        Database/schema pattern(s) to search. CRITICAL: This is a STRING parameter, not an array.
        
        SINGLE CONTAINER:
        - 'DEV01_StGeo_STD_T' (specific database)
        - 'DEV02_WBC_STD_V' (specific schema)
        
        MULTIPLE CONTAINERS (CSV - Comma-Separated Values):
        - '%WBC%,%StGeo%' (all WBC and StGeo databases)
        - 'DEV01_%,DEV02_%' (all DEV01 and DEV02 databases)
        - 'DEV01_StGeo_STD_T,DEV02_WBC_STD_T' (specific databases)
        
        WILDCARDS (%):
        - '%WBC%' (all databases containing WBC)
        - 'DEV01_%' (all databases starting with DEV01_)
        - '%_STD_T' (all databases ending with _STD_T)
        
        CRITICAL FOR AI AGENTS:
        Pass as a SINGLE STRING with commas, NOT as an array.
        ✅ CORRECT: container_pattern="%WBC%,%StGeo%"
        ❌ WRONG:   container_pattern=["%WBC%", "%StGeo%"]
        
        Whitespace is automatically trimmed, so these are equivalent:
        - '%WBC%,%StGeo%' (no spaces)
        - '%WBC%, %StGeo%' (spaces after commas - OK)
        
        When user says "WBC and StGeo databases", convert to: "%WBC%,%StGeo%"
        When user says "DEV01 schemas", convert to: "DEV01_%"
      """)
      
      exclude_objects: str = Field(default='', description="""
        Comma-separated list of object patterns to EXCLUDE (SERVER-SIDE filter).
        Matches against DatabaseName.ObjectName format.
        
        CRITICAL: This is very powerful for reducing result size and query time.
        
        Common patterns:
        - 'PRD_%,PROD_%' (exclude production databases)
        - 'TST_%,UAT_%,STG_%' (exclude test/staging environments)
        - 'OLD_%,ARCHIVE_%,DEPRECATED_%' (exclude legacy databases)
        - '%.temp_%,%.bak_%' (exclude temporary and backup objects)
        - 'DFJ%,C_D02%,SANDBOX_%' (exclude personal/sandbox schemas)
        
        When user says "excluding production", use: exclude_objects="PRD_%,PROD_%"
        When user says "only development", use: exclude_objects="PRD_%,TST_%,UAT_%,STG_%"
      """)
      
      edge_repository: str = Field(default='DEV_01_ODEX_STD_0_V.ODEXRepository', description="""
        ODEX repository table containing pre-computed dependency data.
        Default is usually correct. Only change if user specifies different environment.
      """)
      
      object_types: str = Field(default='', description="""
        Comma-separated list of object types to include (optional filter).
        Empty = all object types included.
        
        Common types:
        - 'T' (tables only)
        - 'V' (views only)
        - 'P' (stored procedures only)
        - 'M' (macros only)
        - 'T,V' (tables and views)
        
        When user asks for "root tables", use: object_types="T"
        When user asks for "base views", use: object_types="V"
      """)
      
      return_format: str = Field(default='detailed', description="""
        Output format: 'detailed' or 'summary'
        
        'detailed' (default): Full object list with all metadata
          Use when: User wants to see the complete list of root objects
        
        'summary': High-level statistics and counts only
          Use when: User asks "how many", "quick check", "overview"
      """)
      
      USAGE EXAMPLES:
      ---------------
      
      Example 1 - Find Root Objects in WBC and StGeo:
      User: "Which objects in WBC and StGeo databases should I start analysing?"
      AI should call:
        container_pattern="%WBC%,%StGeo%"
        exclude_objects="PRD_%"
        return_format="detailed"
      
      Example 2 - Root Tables Only:
      User: "Show me base tables with no dependencies in DEV01"
      AI should call:
        container_pattern="DEV01_%"
        object_types="T"
        return_format="detailed"
      
      Example 3 - Quick Count:
      User: "How many root objects are in StGeo?"
      AI should call:
        container_pattern="%StGeo%"
        return_format="summary"
      
      Example 4 - Excluding Production and Temp:
      User: "Find root objects in WBC excluding production and temporary objects"
      AI should call:
        container_pattern="%WBC%"
        exclude_objects="PRD_%,%.temp_%,%.bak_%"
        return_format="detailed"
      
      Example 5 - Multiple Specific Databases:
      User: "What are the starting points in DEV01_StGeo_STD_T and DEV02_WBC_STD_T?"
      AI should call:
        container_pattern="DEV01_StGeo_STD_T,DEV02_WBC_STD_T"
        return_format="detailed"
      
      COMMON MISTAKES TO AVOID:
      -------------------------
      ❌ Passing container_pattern as array: container_pattern=["%WBC%", "%StGeo%"]
         ✅ Correct: container_pattern="%WBC%,%StGeo%"
      
      ❌ Forgetting to use wildcards when user says "WBC databases"
         ✅ Correct: Use "%WBC%" not "WBC"
      
      ❌ Not excluding production when user wants "dev only"
         ✅ Correct: Add exclude_objects="PRD_%,PROD_%"
      
      ❌ Using return_format="summary" when user wants to see the list
         ✅ Correct: Use return_format="detailed" to show actual objects
      
      PERFORMANCE TIPS:
      -----------------
      - Use exclude_objects to reduce result size
      - Use object_types to filter by type (T, V, P, M)
      - Use return_format="summary" for quick checks
      - Be specific with container patterns when possible
      
      WHAT ARE ROOT OBJECTS:
      ----------------------
      Root objects are database objects that have NO upstream dependencies.
      They appear as source objects in the ODEX repository but never as
      target objects. This means:
      - Nothing else depends on them for their data
      - They are foundational/base objects
      - They are ideal starting points for downstream impact analysis
      - They often represent source tables, landing tables, or external data feeds
      
      Root objects are particularly useful for:
      - Understanding data lineage origins
      - Planning migration strategies (start with roots)
      - Identifying critical foundation objects
      - Downstream impact analysis (what breaks if roots change)

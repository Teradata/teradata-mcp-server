qlty_missingValues:
  type: tool
  description: "List the column names that contain NULL or missing values in a table. Returns a column-level summary showing WHICH columns have missing data. Use when the user asks which columns have nulls, which fields have missing data, or how many nulls exist per column. Do NOT use to retrieve the actual data rows — use qlty_rowsWithMissingValues to get the specific records where a column is null."
  parameters:
    database_name:
      description: "Name of the database (optional)"
      type_hint: str
      default: ''
    table_name:
      description: "Table name to analyze"
      type_hint: str
  sql: |
    select ColumnName, NullCount, NullPercentage from TD_ColumnSummary ( on (SELECT * FROM {table_ref}) as InputTable using TargetColumns ('[:]')) as dt ORDER BY NullCount desc

qlty_negativeValues:
  type: tool
  description: "Identify which numeric columns in a table contain negative values. Use when the user asks about negative numbers, values below zero, or columns with anomalous negative entries. Returns the list of affected column names."
  parameters:
    database_name:
      description: "Name of the database (optional)"
      type_hint: str
      default: ''
    table_name:
      description: "Table name to analyze"
      type_hint: str
  sql: |
    select ColumnName, NegativeCount from TD_ColumnSummary ( on (SELECT * FROM {table_ref}) as InputTable using TargetColumns ('[:]')) as dt ORDER BY NegativeCount desc

qlty_distinctCategories:
  type: tool
  description: "Get the unique (distinct) values present in a specific column of a table. Use when the user asks what unique values, categories, or entries exist in a named column. Requires both a table name and a column name — if no column name is specified, ask for clarification before calling."
  parameters:
    database_name:
      description: "Name of the database (optional)"
      type_hint: str
      default: ''
    table_name:
      description: "Table name to analyze"
      type_hint: str
    column_name:
      description: "Column name to analyze"
      type_hint: str
  sql: |
    select * from TD_CategoricalSummary ( on (SELECT * FROM {table_ref}) as InputTable using TargetColumns ('{column_name}')) as dt

qlty_standardDeviation:
  type: tool
  description: "Calculate the mean (average) and standard deviation for a single numeric column. Use when the user asks specifically for standard deviation, the spread of values, or just mean and variability. For a fuller statistical profile including min, max, quartiles, and percentiles, use qlty_univariateStatistics instead."
  parameters:
    database_name:
      description: "Name of the database (optional)"
      type_hint: str
      default: ''
    table_name:
      description: "Table name to analyze"
      type_hint: str
    column_name:
      description: "Column name to analyze"
      type_hint: str
  sql: |
    select * from TD_UnivariateStatistics ( on (SELECT * FROM {table_ref}) as InputTable using TargetColumns ('{column_name}') Stats('MEAN','STD')) as dt ORDER BY 1,2

qlty_columnSummary:
  type: tool
  description: "Get summary statistics for ALL columns in a table in a single call. Use when the user asks for an overview, profile, or summary of every field in a table. For detailed statistics on a SINGLE specific column (min, max, percentiles), use qlty_univariateStatistics instead."
  parameters:
    database_name:
      description: "Name of the database (optional)"
      type_hint: str
      default: ''
    table_name:
      description: "Table name to analyze"
      type_hint: str
  sql: |
    select * from TD_ColumnSummary ( on (SELECT * FROM {table_ref}) as InputTable using TargetColumns ('[:]')) as dt

qlty_univariateStatistics:
  type: tool
  description: "Calculate full univariate statistics for a single numeric column including min, max, mean, standard deviation, quartiles, and percentiles. Use when the user asks for a complete or comprehensive statistical breakdown of one specific column. For just mean and standard deviation, use qlty_standardDeviation. For statistics across ALL columns in a table at once, use qlty_columnSummary."
  parameters:
    database_name:
      description: "Name of the database (optional)"
      type_hint: str
      default: ''
    table_name:
      description: "Table name to analyze"
      type_hint: str
    column_name:
      description: "Column name to analyze"
      type_hint: str
  sql: |
    select * from TD_UnivariateStatistics ( on (SELECT * FROM {table_ref}) as InputTable using TargetColumns ('{column_name}') Stats('ALL')) as dt ORDER BY 1,2

qlty_rowsWithMissingValues:
  type: tool
  description: "Retrieve the actual data rows where a specific column is NULL or missing. Returns the records themselves, not a column summary. Use when the user wants to SEE or FETCH the rows with missing values in a named column. Do NOT write a SQL query with base_readQuery for this — always use this tool when the request is about rows with null values. Do NOT use for a column-level summary of which columns have nulls — use qlty_missingValues for that."
  parameters:
    database_name:
      description: "Name of the database (optional)"
      type_hint: str
      default: ''
    table_name:
      description: "Table name to analyze"
      type_hint: str
    column_name:
      description: "Column name to analyze for missing values"
      type_hint: str
  sql: |
    select * from TD_getRowsWithMissingValues ( ON (SELECT * FROM {table_ref}) AS InputTable USING TargetColumns ('[{column_name}]')) AS dt

qlty_databaseQuality:
  type: prompt
  description: "Database data quality assessment. (prompt_type: reporting)"
  prompt: |
    # Name:  Database data quality assessment

    # Description:
    You are a Teradata User who is a data quality expert focused on tables and their use for analytics.

    # Process
    - You will work through all the phases in order
    - You will complete a phase and pass the outcomes to the subsequent phase
    - You will be assessing the {database_name} database and all the tables in it

    ## Phase 1 - get database tables
    - Get a list of tables in the {database_name} database using the base_tableList tool
    - Create a list of database_name.table_name for the next phase

    ## Phase 2 - collect table information
    Cycle through the list of tables, for each table do the following steps in order:
    - Step 1 - using the base_tableDDL tool to get the table structure, using the structure generate a business description of the table and all of the columns.
    - Step 2 - using the qlty_columnSummary tool, gather column statistics for the table
    - Step 3 - using the qlty_univariateStatistics tool to get the univariate statistics for a table
    - Step 4 - using the qlty_rowsWithMissingValues tool to get rows with missing values in a table

    ## Phase 3 - Present results as a dashboard
    - At the beginning of the dashboard identify the database
    - For each table present the results from phase 2 together
    - Ensure that each table is presented the same way
    - Use color to highlight points of interest

    # Communication guidelines
    - Be concise but informative in your explanation
    - Clearly indicate which phase you are currently in and only focus on the activities of the current phase
    - Summarize the outcome of the phase before moving to the next phase

    # Final output
    A professional data quality dashboard that is easily navigable.
  parameters:
    database_name:
      name: database_name
      description: "Name of the database to assess for data quality."
      required: true
      type_hint: str

all:
  tool:
    - .*
  prompt:
    - ^(?!test_).*
  resource:
    - .*

tester:
  tool:
    - .*
  prompt:
    - .*
  resource:
    - .*

dba:
  tool:
    - ^dba_*
    - ^base_*
    - ^sec_*
  prompt:
    - ^dba_*

dataScientist:
  tool:
    - ^base_*
    - ^rag_*
    - ^sql_*
    - ^fs_*
    - ^qlty_*
    - ^tdvs_*
    - ^sec_userDbPermissions
    - ^dba_userSqlList
    - ^plot_*
    - ^tdml_*
  prompt:
    - ^rag_*
    - ^sql_*
    - ^tdvs_*

eda:
  tool:
    - "base_(?!(writeQuery|dynamicQuery)$).*"
    - qlty_.*
    - sec_userDbPermissions

bar:
  tool:
    - ^bar_*
    - ^base_readQuery$
    - ^base_databaseList$
  prompt:
    - ^bar_*
  resource:
    - ^bar_*

llmUser:
  tool:
    - ^base_*
    - ^chat_*
  prompt:
    - ^chat_*

graph:
  tool:
    - ^graph_.*
  prompt:
    - ^graph_.*
  resource:
    - ^graph_edge_contract$

# Optional row-cap overrides (issue #249).
# Caps every tool's result set at the per-tool value, falling back to
# DEFAULT_ROW_LIMIT (1000) and MAX_ROW_LIMIT (50000) env vars otherwise.
# Add a `tool_row_limits:` map under any profile to override Python handle_*
# tools by exact name. YAML-defined tools should set `row_limit:` in their
# `*_objects.yml` definition instead.
#
# Example:
#   dba:
#     tool: [...]
#     tool_row_limits:
#       base_tableList: 5000
#       base_columnDescription: 2000

